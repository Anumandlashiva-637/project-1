apiVersion: apps/v1
kind: Deployment
metadata:
  name: plan-service
  namespace: telecom
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
    spec:
      containers:
        - name: customer
          image: customer-service
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
